<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Aggregator: flera My Maps (KMZ/KML)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: Arial, Helvetica, sans-serif; }
    #map { position: absolute; top:120px; bottom:0; left:0; right:0; }
    #control { position: absolute; left:10px; top:10px; right:10px; height:100px; background: rgba(255,255,255,0.95); padding:8px; border-radius:6px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; z-index:1000; }
    input[type=text] { padding:6px; }
    .grow { flex:1; min-width:200px; }
    button { padding:6px 10px; }
    #layersList { position:absolute; right:10px; top:10px; background:white; padding:8px; border-radius:6px; max-height:300px; overflow:auto; z-index:1000; }
    .catItem { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .small { font-size:0.9em; color:#444; }
  </style>
</head>
<body>
  <div id="control">
    <div style="display:flex;gap:8px;align-items:center;">
      <input id="kmlUrl" class="grow" type="text" placeholder="Manuell raw URL till .kml eller .kmz (valfritt)" />
      <input id="category" type="text" placeholder="Kategori (t.ex. 'Vandringsleder')" style="width:160px" />
      <button id="addBtn">Lägg till</button>
    </div>

    <div style="display:flex;gap:8px;align-items:center;width:100%;">
      <button id="loadManifestBtn">Läs kmz/list.json (lokalt)</button>
      <span class="small">— Eller hämta direkt från GitHub repo:</span>
      <input id="ghOwner" type="text" placeholder="owner" style="width:100px" />
      <input id="ghRepo" type="text" placeholder="repo" style="width:120px" />
      <input id="ghBranch" type="text" placeholder="branch (valfritt)" style="width:100px" />
      <button id="loadFromGhBtn">Hämta från GitHub</button>
    </div>

    <div style="width:100%;display:flex;gap:8px;align-items:center;">
      <span id="status" style="font-size:0.9em;color:#333"></span>
    </div>
  </div>

  <div id="layersList"></div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/togeojson@0.16.0/togeojson.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script>
    const map = L.map('map').setView([59.33, 18.06], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);

    const categories = {}; // name -> L.LayerGroup
    const mapsMeta = [];

    const statusEl = document.getElementById('status');
    const layersListEl = document.getElementById('layersList');

    function setStatus(s) { statusEl.textContent = s || ''; }

    function ensureCategory(name) {
      if (!name) name = 'default';
      if (!categories[name]) {
        categories[name] = L.layerGroup().addTo(map);
      }
      return categories[name];
    }

    function renderLayersList() {
      layersListEl.innerHTML = '<strong>Kategorier</strong><br/>';
      Object.keys(categories).forEach(name => {
        const div = document.createElement('div');
        div.className = 'catItem';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = map.hasLayer(categories[name]);
        cb.onchange = () => {
          if (cb.checked) map.addLayer(categories[name]); else map.removeLayer(categories[name]);
        };
        const label = document.createElement('span');
        const count = categories[name].getLayers().length;
        label.textContent = name + ' (' + count + ')';
        div.appendChild(cb);
        div.appendChild(label);
        layersListEl.appendChild(div);
      });
    }

    async function fetchText(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.text();
    }

    async function fetchArrayBuffer(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.arrayBuffer();
    }

    async function loadKmlOrKmz(url, categoryName, displayName) {
      setStatus('Laddar ' + url + ' ...');
      try {
        let kmlText = null;

        if (url.toLowerCase().endsWith('.kmz')) {
          const ab = await fetchArrayBuffer(url);
          const zip = await JSZip.loadAsync(ab);
          const kmlFileName = Object.keys(zip.files).find(n => n.toLowerCase().endsWith('.kml'));
          if (!kmlFileName) throw new Error('Ingen .kml hittades i KMZ-filen: ' + url);
          kmlText = await zip.files[kmlFileName].async('text');
        } else {
          kmlText = await fetchText(url);
        }

        const parser = new DOMParser();
        const kmlDoc = parser.parseFromString(kmlText, 'text/xml');
        const geojson = toGeoJSON.kml(kmlDoc);

        geojson.features.forEach(f => {
          if (!f.properties) f.properties = {};
          f.properties._sourceMap = displayName || url;
        });

        const layer = L.geoJSON(geojson, {
          onEachFeature: (feature, lyr) => {
            let html = '<strong>' + (feature.properties.name || '') + '</strong><br/>';
            if (feature.properties.description) html += feature.properties.description;
            if (feature.properties._sourceMap) html += '<hr/><em>' + feature.properties._sourceMap + '</em>';
            lyr.bindPopup(html);
          },
          pointToLayer: (feature, latlng) => {
            return L.circleMarker(latlng, { radius:6, fillColor:'#3388ff', color:'#fff', weight:1, fillOpacity:0.9 });
          }
        });

        const cat = ensureCategory(categoryName || 'default');
        layer.addTo(cat);
        mapsMeta.push({ url, category: categoryName || 'default', name: displayName || url, layer });
        renderLayersList();
        setStatus('Inläst: ' + (displayName || url));
        try { if (layer.getBounds && layer.getBounds().isValid()) map.fitBounds(layer.getBounds(), { maxZoom: 14 }); } catch(e){}
      } catch (err) {
        console.error(err);
        setStatus('Fel: ' + err.message);
      }
    }

    // Manuell knapp
    document.getElementById('addBtn').addEventListener('click', () => {
      const url = document.getElementById('kmlUrl').value.trim();
      const cat = document.getElementById('category').value.trim() || 'default';
      if (!url) { setStatus('Ange en URL till .kml eller .kmz'); return; }
      loadKmlOrKmz(url, cat, url);
    });

    // Läs lokalt manifest: ./kmz/list.json
    document.getElementById('loadManifestBtn').addEventListener('click', async () => {
      setStatus('Hämtar kmz/list.json ...');
      try {
        const txt = await fetchText('./kmz/list.json');
        const list = JSON.parse(txt);
        if (!Array.isArray(list)) throw new Error('list.json måste vara en array');
        // stöd för både ["a.kmz"] och [{file:"a.kmz", category:"Katt"}]
        for (const item of list) {
          if (typeof item === 'string') {
            await loadKmlOrKmz('./kmz/' + item, 'default', item);
          } else if (item && item.file) {
            await loadKmlOrKmz('./kmz/' + item.file, item.category || 'default', item.file);
          }
        }
        setStatus('Manifest laddad.');
      } catch (err) {
        console.error(err);
        setStatus('Fel vid manifest: ' + err.message);
      }
    });

    // Hämta från offentligt GitHub-repo: listar /kmz via API
    document.getElementById('loadFromGhBtn').addEventListener('click', async () => {
      const owner = document.getElementById('ghOwner').value.trim();
      const repo = document.getElementById('ghRepo').value.trim();
      const branch = document.getElementById('ghBranch').value.trim();
      if (!owner || !repo) { setStatus('Fyll i owner och repo'); return; }
      const apiUrl = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/kmz` + (branch ? `?ref=${encodeURIComponent(branch)}` : '');
      setStatus('Kontaktar GitHub API...');
      try {
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error('GitHub API HTTP ' + res.status);
        const entries = await res.json();
        if (!Array.isArray(entries)) throw new Error('Innehåll ej en lista');
        // läs alla filer och ladda de med download_url (.kmz/.kml)
        for (const e of entries) {
          if (e.type === 'file' && (e.name.toLowerCase().endsWith('.kmz') || e.name.toLowerCase().endsWith('.kml'))) {
            await loadKmlOrKmz(e.download_url, 'default', e.name);
          }
        }
        setStatus('Filer från GitHub laddade.');
      } catch (err) {
        console.error(err);
        setStatus('Fel GitHub: ' + err.message);
      }
    });

    // Vid uppstart: försök läsa manifest automatiskt (valfritt)
    (async () => {
      try {
        // försök hämta lokalt manifest (tyst fail)
        const resp = await fetch('./kmz/list.json');
        if (resp.ok) {
          document.getElementById('loadManifestBtn').click();
        }
      } catch(e){}
    })();
  </script>
</body>
</html>
